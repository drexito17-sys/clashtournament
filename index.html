<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TORNEO CLASH - 1 DE JULIO - info en discord</title>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Anton&display=swap');

  body {
  margin: 0;
  padding: 0;
  overflow-x: hidden;

  font-family: 'Press Start 2P', cursive;
  color: white;
  text-align: center;

  background: linear-gradient(270deg, #0f0020, #001a2e, #1a0033);
  background-size: 600% 600%;
  animation: moveBg 10s ease infinite;
}

.hero {
  background: linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.75)),
    url('https://i.imgur.com/Brillo.png') center/cover no-repeat;
  min-height: 100vh;
  padding: 40px 20px;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

h1 {
  font-size: 3rem;
  color: #ffcc00;
  text-shadow: 0 0 30px #ffcc00;
  margin: 10px 0;
}

.subtitle {
  font-size: 2rem;
  margin-bottom: 30px;
}

.countdown {
  font-size: 2.3rem;
  background: rgba(0,0,0,0.85);
  padding: 30px;
  border-radius: 20px;
  margin: 30px auto;
  max-width: 700px;
  border: 3px solid #ffcc00;
}

/* LIVE SECTION */
.live-grid{
  display:grid;
  grid-template-columns: 3fr 1fr;
  gap:20px;
  max-width:1200px;
  margin:auto;
}

.next-live{
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,215,0,.4);
  border-radius:20px;
  padding:20px;
  text-align:center;
  backdrop-filter:blur(10px);
}

/* 🔥 AQUÍ ESTÁ EL CAMBIO IMPORTANTE */
.live-video iframe{
  width:100%;
  height:85vh; /* 👈 MÁS GRANDE */
  border-radius:20px;
  border:none;
  box-shadow: 0 0 30px rgba(255,0,80,0.4);
}

#live-countdown{
  font-size:2rem;
  font-weight:bold;
  color:#ffd700;
  text-shadow:0 0 10px #ffd700;
}

section {
  min-height: 100vh;
  padding: 40px 20px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

.esports-section {
  background: radial-gradient(circle at top, #1a0033, #0a001f);
}

.title {
  font-size: 2.2rem;
  color: #ffcc00;
  text-shadow: 0 0 20px #ffcc00;
}

.btn {
  background: linear-gradient(45deg, #ffcc00, #ff9900);
  color: black;
  padding: 15px 40px;
  font-size: 1.2rem;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  margin: 10px;
}

.btn.secondary {
  background: transparent;
  border: 2px solid #00f0ff;
  color: #00f0ff;
}

@keyframes moveBg {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}
  </style>
</head>

<body>

<!-- HERO -->
<section class="hero">
  <h1>TORNEO CLASH</h1>
  <p class="subtitle">3 DE JULIO</p>

  <div class="countdown" id="event-countdown">
    Cargando cuenta regresiva...
  </div>
</section>

<!-- LIVE -->
<section class="live-section">

  <div class="live-grid">

    <div class="live-video">
      <iframe src="https://www.youtube.com/embed/TU_ID" allowfullscreen></iframe>
    </div>

    <div class="next-live">
      <h3>🔴 PRÓXIMO LIVE</h3>
      <div id="live-countdown">00:00:00</div>
      <p>Inicio del stream</p>
    </div>

  </div>

</section>

<script>
const fechaEvento = new Date("2026-07-03T20:00:00").getTime();

/* COUNTDOWN TORNEO */
setInterval(() => {
  const ahora = new Date().getTime();
  const distancia = fechaEvento - ahora;

  const dias = Math.floor(distancia / (1000*60*60*24));
  const horas = Math.floor((distancia % (1000*60*60*24)) / (1000*60*60));
  const minutos = Math.floor((distancia % (1000*60*60)) / (1000*60));
  const segundos = Math.floor((distancia % (1000*60)) / 1000);

  const el = document.getElementById("event-countdown");
  if (!el) return;

  el.innerHTML = `${dias}d ${horas}h ${minutos}m ${segundos}s`;

  if (distancia < 0) {
    el.innerHTML = "¡EL TORNEO YA COMENZÓ!";
  }
}, 1000);

/* LIVE COUNTDOWN */
setInterval(() => {
  const ahora = new Date().getTime();
  const distancia = fechaEvento - ahora;

  const el = document.getElementById("live-countdown");
  if (!el) return;

  if (distancia <= 0) {
    el.innerHTML = "🔴 EN VIVO";
    return;
  }

  const horas = Math.floor(distancia / (1000*60*60));
  const minutos = Math.floor((distancia % (1000*60*60)) / (1000*60));
  const segundos = Math.floor((distancia % (1000*60)) / 1000);

  el.innerHTML = `${horas}h ${minutos}m ${segundos}s`;

}, 1000);
</script>

</body>
</html>
